name: build-installer

on:
  push:
    branches:
      - "**"

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoLogin.csproj

      - name: Publish win-x64
        run: dotnet publish AutoLogin.csproj -c Release -r win-x64 --self-contained true -p:WindowsAppSDKSelfContained=true -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc "/DMyAppVersion=1.0.${{ github.run_number }}" "/DPublishDir=$PWD\publish" "installer\AutoLogin.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLogin-Installer
          path: dist\*.exe
