name: build-installer

on:
  push:
    branches:
      - "**"

jobs:
  windows-installer:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoLogin.csproj

      - name: Publish win-${{ matrix.arch }}
        run: dotnet publish AutoLogin.csproj -c Release -r win-${{ matrix.arch }} --self-contained true -p:WindowsAppSDKSelfContained=true -o publish\${{ matrix.arch }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          $publishDir = "$PWD\publish\${{ matrix.arch }}"
          if (!(Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }
          & $iscc "/DMyAppVersion=1.0.${{ github.run_number }}" "/DTargetArch=${{ matrix.arch }}" "/DPublishDir=$publishDir" "installer\AutoLogin.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLogin-Installer-${{ matrix.arch }}
          path: dist\*-${{ matrix.arch }}.exe
